<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAuth | Modern Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .log-area {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        .log-area::-webkit-scrollbar {
            width: 4px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        
        <!-- Left Side: Authentication Card -->
        <div class="glass-morphism rounded-3xl p-8 shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-blue-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 id="form-title" class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
                <p id="form-subtitle" class="text-slate-400 text-center">Enter your details to access your account</p>
            </div>

            <!-- Toggle Tabs -->
            <div class="flex p-1 bg-slate-800/50 rounded-xl mb-8">
                <button onclick="toggleForm('login')" id="login-tab" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-blue-600 text-white shadow-lg">Login</button>
                <button onclick="toggleForm('register')" id="register-tab" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-slate-400 hover:text-white">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="form-transition space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all" placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-all transform active:scale-[0.98] shadow-lg shadow-blue-500/25">
                    Sign In
                </button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="register-form" class="form-transition space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all" placeholder="Choose a username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all" placeholder="Min. 8 characters + 1 number">
                </div>
                <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-all transform active:scale-[0.98] shadow-lg shadow-emerald-500/25">
                    Create Account
                </button>
            </form>
        </div>

        <!-- Right Side: Status & Logs Area -->
        <div class="lg:sticky lg:top-4">
            <div class="glass-morphism rounded-3xl overflow-hidden border-slate-800 shadow-xl">
                <div class="px-6 py-4 bg-slate-800/50 border-b border-slate-700 flex items-center justify-between">
                    <h3 class="text-sm font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                        System Logs
                    </h3>
                    <button onclick="clearLogs()" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Clear</button>
                </div>
                <div id="log-area" class="log-area h-80 p-6 overflow-y-auto space-y-4 font-mono text-sm">
                    <div class="text-slate-500 italic">Waiting for input...</div>
                </div>
            </div>
            
            <div class="mt-6 p-6 glass-morphism rounded-3xl">
                <h4 class="text-white font-semibold mb-2">How it works</h4>
                <p class="text-slate-400 text-sm leading-relaxed">
                    This interface communicates with a real Node.js backend using SQLite. Your password validation rules are enforced server-side.
                </p>
            </div>
        </div>
    </div>

    <script>
        const logArea = document.getElementById('log-area');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');

        function addLog(message, type = 'info') {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const colors = {
                info: 'text-blue-400',
                success: 'text-emerald-400',
                error: 'text-rose-400',
                warn: 'text-amber-400'
            };
            
            const logEntry = document.createElement('div');
            logEntry.className = 'border-l-2 border-slate-700 pl-4 py-1 animate-in fade-in slide-in-from-left duration-300';
            logEntry.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="text-slate-600 shrink-0 mt-0.5 text-[10px]">[${time}]</span>
                    <span class="${colors[type]} leading-tight">${message}</span>
                </div>
            `;
            
            if (logArea.querySelector('.italic')) logArea.innerHTML = '';
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLogs() {
            logArea.innerHTML = '<div class="text-slate-500 italic">Waiting for input...</div>';
        }

        function toggleForm(type) {
            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-blue-600 text-white shadow-lg';
                registerTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all text-slate-400 hover:text-white';
                formTitle.innerText = 'Welcome Back';
                formSubtitle.innerText = 'Enter your details to access your account';
                addLog('Switched to Login view');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-emerald-600 text-white shadow-lg';
                loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all text-slate-400 hover:text-white';
                formTitle.innerText = 'Create Account';
                formSubtitle.innerText = 'Join us and start your journey today';
                addLog('Switched to Registration view');
            }
        }

        async function handleFormSubmit(e, endpoint, type) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            addLog(`${type === 'login' ? 'Attempting Login' : 'Registering'} user: <strong>${data.username}</strong>`, 'info');
            addLog('Validating payload and checking server status...', 'info');

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    addLog(result.message, 'success');
                    if(type === 'login') {
                        addLog('Redirecting to dashboard...', 'success');
                    } else {
                        addLog('Please switch to login to enter your account', 'warn');
                    }
                    e.target.reset();
                } else {
                    addLog(`Error: ${result.message}`, 'error');
                }
            } catch (err) {
                addLog('Network Error: Server might be offline', 'error');
            }
        }

        loginForm.addEventListener('submit', (e) => handleFormSubmit(e, '/login', 'login'));
        registerForm.addEventListener('submit', (e) => handleFormSubmit(e, '/register', 'register'));

        // Initial welcome log
        window.onload = () => addLog('System initialized. Ready for authentication.', 'info');
    </script>
</body>
</html>
